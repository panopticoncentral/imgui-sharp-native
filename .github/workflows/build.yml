name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the aggregated native artifact"
        value: native-all

jobs:
  build-windows:
    name: build (${{ matrix.rid }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            arch: x64
          - rid: win-x86
            arch: Win32
          - rid: win-arm64
            arch: ARM64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch SDL3
        shell: pwsh
        run: ./scripts/fetch-sdl3.ps1

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -A ${{ matrix.arch }} `
            -DSDL3_ROOT="$env:SDL3_ROOT" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Verify exports
        shell: pwsh
        run: |
          Write-Host "Built artifacts under build/:"
          Get-ChildItem -Recurse -Path build -Include *.dll,*.lib,*.exp |
            Select-Object -ExpandProperty FullName | Write-Host

          $dll = Get-ChildItem -Recurse -Path build -Filter imgui_sharp.dll |
                 Select-Object -First 1
          if (-not $dll) { throw "imgui_sharp.dll not found under build/" }

          # PE export names are stored as plain ASCII. Read the whole file
          # and search for IGSharp_Begin in the byte stream via .NET — no
          # dependency on dumpbin (MSVC developer shell required) or
          # findstr (cmd-era path quirks).
          $bytes = [System.IO.File]::ReadAllBytes($dll.FullName)
          $ascii = [System.Text.Encoding]::ASCII.GetString($bytes)
          if ($ascii -notmatch 'IGSharp_Begin') {
            throw "IGSharp_Begin not found in $($dll.FullName) (export missing or hidden?)"
          }
          Write-Host "IGSharp_Begin export verified in $($dll.FullName)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: build/**/imgui_sharp.dll
          if-no-files-found: error

  build-macos:
    name: build (${{ matrix.rid }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            arch: arm64
          - rid: osx-x64
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch SDL3
        run: ./scripts/fetch-sdl3.sh

      - name: Configure
        run: |
          cmake -S . -B build \
            -DSDL3_ROOT="$SDL3_ROOT" \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Verify exports
        run: |
          dylib=build/libimgui_sharp.dylib
          test -f "$dylib" || { echo "Missing $dylib"; exit 1; }
          nm -gU "$dylib" | grep -q 'IGSharp_Begin' || {
            nm -gU "$dylib"
            echo "IGSharp_Begin not exported from $dylib" >&2
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: build/libimgui_sharp.dylib
          if-no-files-found: error

  aggregate:
    name: aggregate runtimes
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts

      - name: Lay out runtimes/<rid>/native
        # Windows artifacts preserve build/**/*.dll nesting (e.g. Release/
        # subdir), so `find` is used to locate the actual binaries
        # regardless of per-arch layout.
        run: |
          set -euo pipefail
          mkdir -p runtimes
          for dir in artifacts/native-*; do
            rid="${dir#artifacts/native-}"
            mkdir -p "runtimes/$rid/native"
            find "$dir" -type f \( -name '*.dll' -o -name '*.dylib' \) \
              -exec cp -v {} "runtimes/$rid/native/" \;
          done
          echo "--- final layout ---"
          find runtimes -type f | sort

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-all
          path: runtimes/
          if-no-files-found: error
