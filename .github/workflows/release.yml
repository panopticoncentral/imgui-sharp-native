name: release

# Publishes ImguiSharp.Redist to nuget.org using NuGet trusted publishing
# (OIDC). One-time setup: register this repo + workflow filename as a
# trusted publisher on nuget.org. Then push a `v*` tag to publish.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + pack without pushing to nuget.org'
        type: boolean
        default: false

permissions:
  contents: write  # for creating the GitHub Release
  id-token: write  # for NuGet OIDC token exchange

jobs:
  build:
    uses: ./.github/workflows/build.yml

  publish:
    name: pack and publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download combined native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-all
          path: nuget/ImguiSharp.Redist/runtimes

      - name: Show staged layout
        run: find nuget/ImguiSharp.Redist/runtimes -type f | sort

      - name: Pack
        run: dotnet pack nuget/ImguiSharp.Redist/ImguiSharp.Redist.csproj -c Release -o packages

      - name: Inspect package contents
        run: |
          set -e
          for nupkg in packages/*.nupkg; do
            echo "=== $nupkg ==="
            unzip -l "$nupkg"
          done

      - name: Login to nuget.org (trusted publishing)
        if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: panopticoncentral

      - name: Push to nuget.org
        if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run
        run: |
          dotnet nuget push packages/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.nupkg
          generate_release_notes: true

      - name: Upload package artifact (dry run)
        if: inputs.dry_run || !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ImguiSharp.Redist-nupkg
          path: packages/*.nupkg
